<circle cx="78" cy="220" r="12" fill="white"/>
<circle cx="122" cy="178" r="12" fill="white"/>
<circle cx="160" cy="197" r="12" fill="white"/>
<circle cx="211" cy="125" r="12" fill="#F58426" stroke="white" stroke-width="7"/>
<path d="M236 124 L264 137 L249 164" fill="none" stroke="#F58426" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
<!-- Wordmark with restrained sports-inspired offset -->
<text x="354" y="203" font-family="Inter, Arial, Helvetica, sans-serif" font-size="150" font-weight="900"
