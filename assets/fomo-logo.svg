<rect width="1200" height="360" fill="white"/>
<!-- Original chat/market icon -->
<path d="M70 55 H260 Q300 55 300 95 V230 Q300 270 260 270 H170 L108 318 V270 H70 Q30 270 30 230 V95 Q30 55 70 55 Z"
