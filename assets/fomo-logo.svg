<text x="344" y="193" font-family="Inter, Arial, Helvetica, sans-serif" font-size="150" font-weight="900"
      letter-spacing="-7" fill="#006BB6">FOM</text>
<text x="688" y="193" font-family="Inter, Arial, Helvetica, sans-serif" font-size="150" font-weight="900"
      letter-spacing="-7" fill="#F58426">O</text>
<rect x="347" y="218" width="522" height="10" rx="5" fill="#F58426"/>
<text x="348" y="270" font-family="Inter, Arial, Helvetica, sans-serif" font-size="26" font-weight="700"
      letter-spacing="1.6" fill="#17243A">FINANZAS · OBSERVACIÓN · MERCADO · OPINIÓN</text>
<text x="348" y="310" font-family="Inter, Arial, Helvetica, sans-serif" font-size="24"
